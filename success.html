<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commande confirmée — French Revolve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .success-page { text-align: center; max-width: 480px; padding: 40px 24px; }
    .success-page svg { color: #1a6b3a; margin: 0 auto 24px; display: block; }
    .success-page h1 { font-size: 36px; letter-spacing: -0.03em; margin-bottom: 16px; }
    .success-page p { font-size: 16px; color: var(--grey-600); line-height: 1.7; margin-bottom: 12px; }
    .success-page .links { display: flex; gap: 12px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="success-page">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9 12l2 2 4-4"/>
    </svg>
    <h1>Merci pour votre commande !</h1>
    <p>Votre paiement a bien été reçu. Vous recevrez un email de confirmation Stripe.</p>
    <p>Nous vous contacterons sous 48 h pour démarrer la fabrication de votre pièce.</p>
    <div class="links">
      <a href="boutique.html" class="btn-ghost">← Retour à la boutique</a>
      <a href="index.html" class="btn-primary">Accueil</a>
    </div>
  </div>
  <script>
    // Clear cart after successful payment
    localStorage.removeItem('fr_cart');
  </script>
</body>
</html>
